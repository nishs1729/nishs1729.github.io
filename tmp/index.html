<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expert Map</title>
<link rel="icon" href="favicon.png" type="image/png">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

.container{
    display:flex;
    height:100vh;
    position:relative;
}

.sidebar{
    width:320px;
    min-width:320px;
    background:white;
    border-right:1px solid #e2e6ef;
    padding:12px;
    overflow-y:auto;
    transition:width .3s ease, padding .3s ease;
}

.sidebar.hidden{
    display:none;
}

.sidebar h2{
    margin-top:0;
    font-size:18px;
}

.info-card{
    background:#f7f9fc;
    padding:14px;
    border-radius:8px;
    margin-bottom:14px;
    border:1px solid #e5e9f2;
}

#map{
    flex:1;
}

.toggle-btn{
    position:absolute;
    bottom:20px;
    left:20px;   /* sits just to the right of sidebar */
    z-index:1000;
    background:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    transition:left .3s ease;
}

.btn{
    background:white;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    transition:left .1s ease;
}

.sidebar.hidden + #map + .toggle-btn{
    left:20px;
}

.section-title{
    cursor:pointer;
    font-weight:600;
    margin-bottom:15px;
}

.section-content{
    display:none;
}

.section-content.active{
    display:block;
}

.expert{
    padding:6px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.expert:hover{
    background:#eef2ff;
}
</style>
</head>

<body>
<div class="container">
    <div class="sidebar" id="sidebar">
        <p><strong>Expert Location Map</strong></p>
        <div class="info-card">
            <p>This map shows the geographic locations of experts in various fields.
               Click on a marker to view name, contact details, and metadata.</p>
        </div>

        <div class="info-card">
            <strong>Instructions</strong>
            <p>Click a marker or a name in the list.</p>
        </div>
        
        <div class="info-card">
            <strong>Data Source</strong>
            <p>Expert data is loaded dynamically from a CSV file.</p>
            <a href="data.csv" download><button class="btn">Download CSV</button></a>
        </div>
        
        <div class="info-card">
            
            <div class="section-title" onclick="toggleSection('expertList')">
                <strong>☰&nbsp; Expert List</strong>
                
            </div>
            
            <div id="expertList" class="section-content active"></div>
        </div>
    </div>
    
    <div id="map"></div>
    
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
</div>

<script>
var map = L.map("map").setView([22.5, 80], 5);

var osmLayer = L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: "© OpenStreetMap contributors" }
);

var satelliteLayer = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    { attribution: "Tiles © Esri" }
);

var labelLayer = L.tileLayer(
    "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    { attribution: "© Esri" }
);

var satelliteWithLabels = L.layerGroup([satelliteLayer,labelLayer]);

osmLayer.addTo(map);

var baseLayers = {
    "Street Map": osmLayer,
    // "Satellite": satelliteLayer,
    "Satellite": satelliteWithLabels
};

L.control.layers(baseLayers).addTo(map);

var markers = {};

/* Sidebar toggle */
function toggleSidebar(){
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("hidden");
    map.invalidateSize();
}

/* Section toggle */
function toggleSection(id){
    document.getElementById(id).classList.toggle("active");
}

/* Load CSV */
Papa.parse("data.csv", {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        addMarkers(results.data);
    }
});

function addMarkers(data) {
    data.forEach(function(person) {
        var popup = "<b>" + person.name + "</b><br>";
        popup += "Contact: " + person.contact + "<br>";

        for (var key in person) {
            if (
                key !== "name" &&
                key !== "contact" &&
                key !== "lat" &&
                key !== "lon" &&
                person[key] !== ""
            ) {
                popup += key + ": " + person[key] + "<br>";
            }
        }

        var marker = L.marker([
            parseFloat(person.lat),
            parseFloat(person.lon)
        ])
        .addTo(map)
        .bindPopup(popup);

        markers[person.name] = marker;

        /* Add name to sidebar list */
        var div = document.createElement("div");
        div.className = "expert";
        div.innerText = person.name;

        div.onclick = function(){
            map.setView(marker.getLatLng(), 6);
            marker.openPopup();
        };

        document.getElementById("expertList").appendChild(div);
    });
}
</script>
</body>
</html>
