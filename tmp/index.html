<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expert Map</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        header h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
        }

        header p {
            margin: 0;
            font-size: 15px;
            line-height: 1.4;
        }

        #map {
            height: calc(100vh - 110px);
            width: 100%;
        }

    </style>

</head>

<body>

<header>

    <h1>Expert Location Map</h1>

    <p>
        This map shows the geographic locations of experts in various fields.
        Click on any marker to view the person's name, contact information,
        and additional details. The data for this map is loaded from a CSV
        file and may include different types of metadata for each entry.
    </p>

</header>

<div id="map"></div>

<script>

    var map = L.map("map").setView([22.5, 80], 5);


    /* -------------------------------
       Base map layers
    -------------------------------- */

    var osmLayer = L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            attribution: "© OpenStreetMap contributors"
        }
    );


    var satelliteLayer = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        {
            attribution:
                "Tiles © Esri — Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye"
        }
    );


    /* -------------------------------
       Label overlay for satellite
    -------------------------------- */

    var labelLayer = L.tileLayer(
        "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
        {
            attribution: "© Esri"
        }
    );


    /* Satellite + Labels combined */

    var satelliteWithLabels = L.layerGroup([
        satelliteLayer,
        labelLayer
    ]);


    /* Default layer */

    osmLayer.addTo(map);


    /* Layer selector */

    var baseLayers = {
        "Street Map": osmLayer,
        "Satellite": satelliteLayer,
        "Satellite + Labels": satelliteWithLabels
    };

    L.control.layers(baseLayers).addTo(map);


    /* -------------------------------
       Load CSV data
    -------------------------------- */

    Papa.parse("data.csv", {

        download: true,
        header: true,
        skipEmptyLines: true,

        complete: function(results) {
            addMarkers(results.data);
        }

    });


    /* -------------------------------
       Add markers
    -------------------------------- */

    function addMarkers(data) {

        data.forEach(function(person) {

            var popup = "<b>" + person.name + "</b><br>";
            popup += "Contact: " + person.contact + "<br>";

            for (var key in person) {

                if (
                    key !== "name" &&
                    key !== "contact" &&
                    key !== "lat" &&
                    key !== "lon" &&
                    person[key] !== ""
                ) {

                    popup += key + ": " + person[key] + "<br>";

                }

            }

            L.marker([
                parseFloat(person.lat),
                parseFloat(person.lon)
            ])
            .addTo(map)
            .bindPopup(popup);

        });

    }

</script>

</body>
</html>
